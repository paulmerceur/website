<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Personal Site</title>
    <style>
      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        background: #111;
        color: #f5f5f5;
      }

      main {
        max-width: 42rem;
        padding: 2rem;
      }

      h1 {
        margin: 0 0 0.5rem;
        font-size: clamp(2rem, 8vw, 4rem);
        line-height: 1;
        letter-spacing: 0;
      }

      p {
        margin: 0;
        color: #bdbdbd;
        font-size: 1rem;
        line-height: 1.5;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>Personal site</h1>
      <p>Static site placeholder served from the Raspberry Pi.</p>
    </main>
  </body>
</html>
